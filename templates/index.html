<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognix - Rule-Based Chatbot</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
    --bg: #0F172A;
    --panel: #111827;
    --panel-2: #1E293B;

    --text: #F8FAFC;
    --text-dim: #94A3B8;

    --accent: #2563EB;
    --accent-hover: #1D4ED8;

    --bubble-user: #2563EB;
    --bubble-bot: #1E293B;

    --border: #334155;
}

[data-theme="light"] {
    --bg: #F8FAFC;
    --panel: #FFFFFF;
    --panel-2: #F1F5F9;

    --text: #0F172A;
    --text-dim: #64748B;

    --accent: #2563EB;
    --accent-hover: #1D4ED8;

    --bubble-user: #2563EB;
    --bubble-bot: #E2E8F0;

    --border: #CBD5E1;
}

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        justify-content: center;
        overflow: hidden;
        transition: background 0.3s ease, color 0.3s ease;
    }

    .app {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--panel);
    }

    .chat-area {
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
    }

    .input-area {
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
    }

 header {
    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 18px 22px;

    background: var(--panel);

    border: none;
    box-shadow: none;

    position: relative;
}


.header-titles h1 {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-left: 20px;
    margin-bottom: 2px;
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 0.5px;
}

.header-titles h1 svg {
    width: 38px;
    height: 38px;
    color: #3B82F6;

}

.header-titles p {
    margin: 0;
    margin-left: 20px;
    font-size: 13px;
    font-weight: 400;
    color: #CBD5E1;
}
    .menu-btn {
        background: none;
        border: none;
        color: var(--text);
        font-size: 22px;
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 8px;
    }
    .menu-btn:hover { background: var(--panel-2); }

    .dropdown {
        position: absolute;
        top: 55px;
        right: 20px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        width: 180px;
        overflow: hidden;
        display: none;
        z-index: 10;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .dropdown.show { display: block; }
    .dropdown button {
        display: block;
        width: 100%;
        text-align: left;
        padding: 10px 14px;
        background: none;
        border: none;
        color: var(--text);
        font-size: 14px;
        cursor: pointer;
    }
    .dropdown button:hover { background: var(--border); }

    /* Chat area */
    .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
    }

    .welcome {
        margin: auto;
        text-align: center;
        color: var(--text-dim);
        padding: 20px;
    }
    .welcome .emoji { font-size: 42px; }
    .welcome h2 {
        color: var(--text);
        margin: 10px 0 6px;
        font-size: 22px;
    }
    .welcome p {
        font-size: 14px;
        max-width: 380px;
        margin: 0 auto 20px;
    }
    .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
    }
    .suggestion-btn {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 20px;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
    }
    .suggestion-btn:hover {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
    }

    .message-row {
        display: flex;
        flex-direction: column;
        margin: 8px 0;
        animation: fadeIn 0.3s ease;
        max-width: 78%;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .message-row.user { align-self: flex-end; align-items: flex-end; }
    .message-row.bot { align-self: flex-start; align-items: flex-start; }

    .bubble {
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.6;
    }
    .message-row.user .bubble {
        background: var(--bubble-user);
        color: white;
        border-bottom-right-radius: 4px;
    }
    .message-row.bot .bubble {
        background: var(--bubble-bot);
        color: var(--text);
        border-bottom-left-radius: 4px;
    }
    .timestamp {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 4px;
        padding: 0 4px;
    }

    .typing {
        display: flex;
        gap: 4px;
        align-items: center;
        font-size: 13px;
        color: var(--text-dim);
        padding: 6px 4px;
    }
    .dot {
        width: 6px;
        height: 6px;
        background: var(--text-dim);
        border-radius: 50%;
        animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
        0%, 80%, 100% { opacity: 0.2; }
        40% { opacity: 1; }
    }

    /* Input area */
    .input-area {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border-top: 1px solid var(--border);
    }
    #userInput {
        flex: 1;
        padding: 12px 16px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        outline: none;
        font-size: 14px;
    }
   #sendBtn {
    background: linear-gradient(135deg, #2563EB, #1D4ED8);
    border: none;
    color: #fff;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
    transition: all 0.25s ease;
}

#sendBtn:hover {
    background: linear-gradient(135deg, #1D4ED8, #1E40AF);
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.45);
}

#sendBtn:active {
    transform: scale(0.95);
}

#userInput:disabled,
#sendBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}
    footer {
        text-align: center;
        font-size: 11px;
        color: var(--text-dim);
        padding: 8px 0 12px;
    }

    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body data-theme="dark">

<div class="app">
    <header>
        <div class="header-titles">
            <h1> 
            <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24"
             fill="currentColor"
             width="20"
             height="20"
             style="width:20px;height: 20px; vertical-align:middle;margin-right:8px;">
            <path d="M11 1V2H7C5.34315 2 4 3.34315 4 5V8C4 10.7614 6.23858 13 9 13H15C17.7614 13 20 10.7614 20 8V5C20 3.34315 18.6569 2 17 2H13V1H11ZM6 5C6 4.44772 6.44772 4 7 4H17C17.5523 4 18 4.44772 18 5V8C18 9.65685 16.6569 11 15 11H9C7.34315 11 6 9.65685 6 8V5ZM9.5 9C10.3284 9 11 8.32843 11 7.5C11 6.67157 10.3284 6 9.5 6C8.67157 6 8 6.67157 8 7.5C8 8.32843 8.67157 9 9.5 9ZM14.5 9C15.3284 9 16 8.32843 16 7.5C16 6.67157 15.3284 6 14.5 6C13.6716 6 13 6.67157 13 7.5C13 8.32843 13.6716 9 14.5 9ZM6 22C6 18.6863 8.68629 16 12 16C15.3137 16 18 18.6863 18 22H20C20 17.5817 16.4183 14 12 14C7.58172 14 4 17.5817 4 22H6Z"/>
        </svg>
    Cognix
    </h1>
            <p>A Rule-Based Chatbot</p>
        </div>
        <button class="menu-btn" id="menuBtn">&#8942;</button>
        <div class="dropdown" id="dropdown">
            <button id="newChatBtn">New Chat</button>
            <button id="clearChatBtn">Clear Chat</button>
            <button id="aboutBtn">About</button>
            <button id="helpBtn">Help</button>
            <button id="themeBtn">Toggle Light/Dark Theme</button>
            <button id="exitBtn">Exit</button>
        </div>
    </header>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcomeScreen">
            <h2>
    <svg xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 24 24"
         fill="currentColor"
         width="44"
         height="44"
         style="width: 44px; height: 44px; vertical-align:middle;">
        <path d="M11 1V2H7C5.34315 2 4 3.34315 4 5V8C4 10.7614 6.23858 13 9 13H15C17.7614 13 20 10.7614 20 8V5C20 3.34315 18.6569 2 17 2H13V1H11ZM6 5C6 4.44772 6.44772 4 7 4H17C17.5523 4 18 4.44772 18 5V8C18 9.65685 16.6569 11 15 11H9C7.34315 11 6 9.65685 6 8V5ZM9.5 9C10.3284 9 11 8.32843 11 7.5C11 6.67157 10.3284 6 9.5 6C8.67157 6 8 6.67157 8 7.5C8 8.32843 8.67157 9 9.5 9ZM14.5 9C15.3284 9 16 8.32843 16 7.5C16 6.67157 15.3284 6 14.5 6C13.6716 6 13 6.67157 13 7.5C13 8.32843 13.6716 9 14.5 9ZM6 22C6 18.6863 8.68629 16 12 16C15.3137 16 18 18.6863 18 22H20C20 17.5817 16.4183 14 12 14C7.58172 14 4 17.5817 4 22H6Z"/>
    </svg>
</h2>
            <h2>Welcome to Cognix</h2>
            <p>A professional rule-based chatbot that answers predefined questions using keyword matching.</p>
            <div class="suggestions">
                <button class="suggestion-btn" data-msg="hello?">hello?</button>
                <button class="suggestion-btn" data-msg="What is Python?">What is Python?</button>
                <button class="suggestion-btn" data-msg="Who are you?">Who are you?</button>
                <button class="suggestion-btn" data-msg="AI">AI</button>
                <button class="suggestion-btn" data-msg="tell me a joke">tell me a joke</button>
                <button class="suggestion-btn" data-msg="what can you do?">what can you do?</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autofocus>
        <button id="sendBtn" title="Send">&#8593;</button>
    </div>

    <footer>&copy; Cognix | Rule-Based Chatbot Project</footer>
</div>

<script>
const chatArea = document.getElementById("chatArea");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const welcomeScreen = document.getElementById("welcomeScreen");
const menuBtn = document.getElementById("menuBtn");
const dropdown = document.getElementById("dropdown");

// ---- Menu toggle ----
menuBtn.addEventListener("click", () => dropdown.classList.toggle("show"));
document.addEventListener("click", (e) => {
    if (!menuBtn.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove("show");
    }
});

// ---- Menu actions ----
document.getElementById("newChatBtn").addEventListener("click", () => {
    clearChat();
    dropdown.classList.remove("show");
});
document.getElementById("clearChatBtn").addEventListener("click", () => {
    clearChat();
    dropdown.classList.remove("show");
});
document.getElementById("aboutBtn").addEventListener("click", () => {
    alert("Cognix is a rule-based chatbot built for an educational semester project. It uses predefined responses and keyword matching only \u2014 no AI, ML, or NLP models.");
    dropdown.classList.remove("show");
});
document.getElementById("helpBtn").addEventListener("click", () => {
    alert("Type a message or tap a suggestion to chat with Cognix. Try asking about AI, Python, HTML, CSS, JavaScript, or ask for motivation!");
    dropdown.classList.remove("show");
});
document.getElementById("themeBtn").addEventListener("click", () => {
    const body = document.body;
    const current = body.getAttribute("data-theme");
    body.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    dropdown.classList.remove("show");
});
document.getElementById("exitBtn").addEventListener("click", () => {
    if (confirm("Close Cognix?")) window.close();
    dropdown.classList.remove("show");
});

function clearChat() {
    chatArea.innerHTML = "";
    chatArea.appendChild(welcomeScreen);
    welcomeScreen.style.display = "flex";
    welcomeScreen.style.flexDirection = "column";
    welcomeScreen.style.alignItems = "center";
    endChatUI(false);
}

function endChatUI(shouldEnd) {
    // Mirrors the console version's "break": once the user says bye,
    // the input is disabled and the conversation is over until New Chat.
    userInput.disabled = shouldEnd;
    sendBtn.disabled = shouldEnd;
    userInput.placeholder = shouldEnd
        ? "Chat ended \u2014 click New Chat to start again"
        : "Type your message...";
}

// ---- Suggestions ----
document.querySelectorAll(".suggestion-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        sendMessage(btn.getAttribute("data-msg"));
    });
});

function getTimestamp() {
    const now = new Date();
    let hours = now.getHours();
    const minutes = now.getMinutes().toString().padStart(2, "0");
    const ampm = hours >= 12 ? "PM" : "AM";
    hours = hours % 12 || 12;
    return `${hours}:${minutes} ${ampm}`;
}

function addMessage(text, sender) {
    const row = document.createElement("div");
    row.className = "message-row " + sender;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    const time = document.createElement("div");
    time.className = "timestamp";
    time.textContent = getTimestamp();

    row.appendChild(bubble);
    row.appendChild(time);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
    const row = document.createElement("div");
    row.className = "message-row bot";
    row.id = "typingRow";
    row.innerHTML = `<div class="typing">Cognix is typing
        <span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
    const row = document.getElementById("typingRow");
    if (row) row.remove();
}

async function sendMessage(overrideText) {
    const text = (overrideText !== undefined ? overrideText : userInput.value).trim();
    if (text === "") return;

    if (welcomeScreen.parentNode) {
        welcomeScreen.remove();
    }

    addMessage(text, "user");
    userInput.value = "";
    showTyping();

    try {
        const response = await fetch("/get_response", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });
        const data = await response.json();

        setTimeout(() => {
            removeTyping();
            addMessage(data.reply, "bot");
            if (data.end_chat) {
                endChatUI(true);
            }
        }, 500);
    } catch (err) {
        removeTyping();
        addMessage("Sorry, something went wrong connecting to Cognix.", "bot");
    }
}

sendBtn.addEventListener("click", () => sendMessage());
userInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
